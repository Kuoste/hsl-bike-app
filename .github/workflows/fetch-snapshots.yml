name: Fetch Station Snapshots

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Run FetchSnapshot
        env:
          DIGITRANSIT_SUBSCRIPTION_KEY: ${{ secrets.DIGITRANSIT_SUBSCRIPTION_KEY }}
        run: |
          dotnet run --project main-src/tools/FetchSnapshot -- data/snapshots.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.json
          git diff --cached --quiet || git commit -m "Update station snapshots [skip ci]"
          git push
